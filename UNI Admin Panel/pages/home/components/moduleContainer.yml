    app/types.ts: >
      export interface University {
        id: string;
        name: string;
        city: string;
        description: string;
        website: string;
      }


      export interface Graduate {
        id: string;
        fullName: string;
        university: string;
        graduationYear: number;
        specialty: string;
        workplace: string;
        position: string;
        industry: Industry;
        salary?: number;
        email: string;
      }


      export type Industry = 'IT' | 'Образование' | 'Производство' | 'Медицина'
      | 'Другое';


      export const INDUSTRIES: Industry[] = ['IT', 'Образование',
      'Производство', 'Медицина', 'Другое'];


      export interface ImportLog {
        id: string;
        datetime: string;
        filename: string;
        total: number;
        success: number;
        errors: number;
        log: string[];
      }


      export interface ActionLog {
        id: string;
        datetime: string;
        description: string;
      }


      export type AdminTab = 'dashboard' | 'universities' | 'graduates' |
      'reports';
    app/storage.ts: |
      import type { University, Graduate, ImportLog, ActionLog } from './types';

      const UNIS_KEY = 'unis';
      const GRADUATES_KEY = 'graduates';
      const IMPORT_LOGS_KEY = 'importLogs';
      const ACTION_LOGS_KEY = 'actionLogs';

      export function getUniversities(): University[] {
        try {
          return JSON.parse(localStorage.getItem(UNIS_KEY) || '[]');
        } catch {
          return [];
        }
      }

      export function saveUniversities(unis: University[]): void {
        localStorage.setItem(UNIS_KEY, JSON.stringify(unis));
      }

      export function getGraduates(): Graduate[] {
        try {
          return JSON.parse(localStorage.getItem(GRADUATES_KEY) || '[]');
        } catch {
          return [];
        }
      }

      export function saveGraduates(graduates: Graduate[]): void {
        localStorage.setItem(GRADUATES_KEY, JSON.stringify(graduates));
      }

      export function getImportLogs(): ImportLog[] {
        try {
          return JSON.parse(localStorage.getItem(IMPORT_LOGS_KEY) || '[]');
        } catch {
          return [];
        }
      }

      export function saveImportLogs(logs: ImportLog[]): void {
        localStorage.setItem(IMPORT_LOGS_KEY, JSON.stringify(logs));
      }

      export function getActionLogs(): ActionLog[] {
        try {
          return JSON.parse(localStorage.getItem(ACTION_LOGS_KEY) || '[]');
        } catch {
          return [];
        }
      }

      export function addActionLog(description: string): void {
        const logs = getActionLogs();
        logs.unshift({
          id: crypto.randomUUID(),
          datetime: new Date().toLocaleString('ru-RU'),
          description,
        });
        localStorage.setItem(ACTION_LOGS_KEY, JSON.stringify(logs.slice(0, 200)));
