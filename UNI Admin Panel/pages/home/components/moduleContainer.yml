                <Plus size={16} style={{ color: '#b8a9f5' }} /> Добавить выпускника вручную
              </h3>
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {[
                  { key: 'fullName', label: 'ФИО *', placeholder: 'Иванов Иван Иванович', type: 'text' },
                  { key: 'specialty', label: 'Специальность *', placeholder: 'Информатика', type: 'text' },
                  { key: 'graduationYear', label: 'Год выпуска *', placeholder: '2023', type: 'number' },
                  { key: 'workplace', label: 'Место работы', placeholder: 'Яндекс', type: 'text' },
                  { key: 'position', label: 'Должность', placeholder: 'Разработчик', type: 'text' },
                  { key: 'salary', label: 'Зарплата (₽)', placeholder: '100000', type: 'number' },
                  { key: 'email', label: 'Email', placeholder: 'ivanov@mail.ru', type: 'email' },
                ].map(({ key, label, placeholder, type }) => (
                  <div key={key}>
                    <label className="text-xs font-medium text-slate-500 mb-1 block">{label}</label>
                    <input
                      style={inputStyle}
                      type={type}
                      placeholder={placeholder}
                      value={(form as Record<string, unknown>)[key] as string ?? ''}
                      onChange={(e) => setForm((p) => ({ ...p, [key]: type === 'number' ? (e.target.value === '' ? undefined : Number(e.target.value)) : e.target.value }))}
                    />
                    {formErrors[key] && <p className="text-xs text-rose-400 mt-1">{formErrors[key]}</p>}
                  </div>
                ))}
                <div>
                  <label className="text-xs font-medium text-slate-500 mb-1 block">Вуз *</label>
                  <select style={selectStyle} value={form.university} onChange={(e) => setForm((p) => ({ ...p, university: e.target.value }))}>
                    <option value="">— Выберите вуз —</option>
                    {universities.map((u) => <option key={u.id} value={u.name}>{u.name}</option>)}
                  </select>
                  {formErrors.university && <p className="text-xs text-rose-400 mt-1">{formErrors.university}</p>}
                </div>
                <div>
                  <label className="text-xs font-medium text-slate-500 mb-1 block">Сфера деятельности</label>
                  <select style={selectStyle} value={form.industry} onChange={(e) => setForm((p) => ({ ...p, industry: e.target.value as Industry }))}>
                    {INDUSTRIES.map((i) => <option key={i} value={i}>{i}</option>)}
                  </select>
                </div>
              </div>
              <button onClick={handleAdd} className="mt-5 flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold text-white" style={{ background: 'linear-gradient(135deg, #b8a9f5, #93c5fd)' }}>
                <Plus size={15} /> Добавить выпускника
              </button>
            </GlassCard>

            {/* CSV import */}
            <GlassCard>
              <h3 className="text-base font-semibold text-slate-700 mb-4 flex items-center gap-2">
                <Upload size={16} style={{ color: '#99e9c8' }} /> Импорт из CSV
              </h3>
              <p className="text-xs text-slate-400 mb-3">
                Ожидаемые колонки: <span className="font-mono">ФИО, Вуз, Год выпуска, Специальность, Место работы, Должность, Сфера деятельности, Зарплата, Email</span>
              </p>
              <div className="flex flex-wrap gap-3 items-center">
                <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={(e) => { setCsvFile(e.target.files?.[0] ?? null); setImportDone(false); setImportLogs([]); }} />
                <button onClick={() => fileRef.current?.click()} className="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 transition-all" style={{ background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(200,190,255,0.5)' }}>
                  {csvFile ? `📄 ${csvFile.name}` : 'Выбрать CSV-файл'}
                </button>
                <button onClick={handleImport} disabled={!csvFile} className="flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-semibold text-white disabled:opacity-40 transition-all" style={{ background: 'linear-gradient(135deg, #99e9c8, #93c5fd)' }}>
                  <Upload size={14} /> Импортировать
                </button>
              </div>
              {importLogs.length > 0 && (
                <ScrollArea className="mt-4 h-36 rounded-xl p-3" style={{ background: 'rgba(0,0,0,0.03)', border: '1px solid rgba(200,190,255,0.2)' }}>
                  {importLogs.map((l, i) => (
                    <p key={i} className="text-xs font-mono text-slate-600 leading-relaxed">{l}</p>
                  ))}
                </ScrollArea>
              )}
            </GlassCard>

