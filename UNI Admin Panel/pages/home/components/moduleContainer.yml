    AGENTS.md: ''
    initial.md: >
      # Requirements

      ## Summary

      UNI is an administrative panel for an employment analysis information
      system for university graduates. It features a public-facing landing page
      (with project info, benefits, and contacts) and a password-free admin
      panel accessible via a button. Admins can manage universities, track and
      analyze graduate employment data, import graduates from CSV, and export
      reports. All data is persisted in localStorage with demo data seeded on
      first load.


      ## Use cases


      - Landing page with admin entry
        1) User visits the UNI site and sees the public landing page with project description, benefits, and contacts.
        2) User clicks "Вход для администратора" button.
        3) Landing page hides and the admin panel appears with 4 tabs.
        4) Admin clicks "Выйти" to return to the landing page exactly as before.

      - Dashboard (Employment Analytics)
        1) Admin opens the "Дашборд" tab.
        2) Sees total graduates count, employed count, employment percentage.
        3) Sees distribution by industry (IT, Education, Production, Medicine, Other) as CSS bar chart.
        4) Sees average salary and top-3 universities by graduate count.
        5) All metrics auto-update whenever graduates data changes.

      - Universities management
        1) Admin opens the "Вузы" tab.
        2) Sees a table/card list of universities (name, city, description, website link).
        3) Admin adds a new university via an inline form.
        4) Admin edits an existing university via a modal form.
        5) Admin deletes a university with a confirmation prompt.
        6) Data persisted in localStorage key `unis`.

      - Graduates management and CSV import
        1) Admin opens the "Выпускники" tab.
        2) Manually fills in graduate form (ФИО, university dropdown, graduation year, specialty, workplace, position, industry, salary, email) and clicks "Добавить выпускника".
        3) New graduate is validated and saved to localStorage key `graduates`; dashboard updates.
        4) Admin selects a CSV file with columns: ФИО, Вуз, Год выпуска, Специальность, Место работы, Должность, Сфера деятельности, Зарплата, Email.
        5) Admin clicks "Импортировать"; CSV is parsed, valid rows added to graduates, errors listed per row.
        6) Import log (rows total, success, errors with row number and reason) shown in scrollable log area.
        7) Admin sees full graduates table with columns: ФИО, Вуз, Год выпуска, Сфера деятельности, Место работы, Зарплата, Действия.
        8) Admin edits a graduate via modal form and saves changes.
        9) Admin deletes a graduate with confirmation; dashboard updates.

      - Reports and logs
        1) Admin opens the "Аналитика и логи" tab.
        2) Sees history of CSV imports (date/time, filename, success count, error count).
        3) Sees recent admin actions log (add/delete graduate, edit university, etc.) with timestamps.
        4) Admin clicks "Скачать CSV" to export all current graduates as a CSV file download.

      ## Plan


      ### Landing page with admin entry

      1. [x] Create the main app layout with two top-level sections: `#landing`
      (public page) and `#admin` (admin panel, initially hidden).

      2. [x] Build the landing page with hero section (UNI title, subtitle,
      description), features/benefits section (3–4 cards), and contacts/footer
      section with realistic demo content.

      3. [x] Add "Вход для администратора" button in the landing page
      header/hero that hides `#landing` and shows `#admin`.

      4. [x] Apply glassmorphism/frosted-glass design: pastel gradient
      background (`linear-gradient(135deg, #f5f0ff, #e9f0f5)`), cards with
      `backdrop-filter: blur(10px)`, `rgba(255,255,255,0.55)` backgrounds, soft
      shadows, 16–20px border-radius, Inter/system sans-serif font.

      5. [x] Add "Выйти" button in the admin panel header that hides `#admin`
      and shows `#landing`.


      ### Dashboard (Employment Analytics)

      1. [x] Create the Dashboard tab UI with a responsive grid of metric cards:
      total graduates, employed graduates count, employment percentage.

      2. [x] Add an industry distribution section rendered as CSS bar chart
      (Grid/Flexbox) reading counts from the graduates array grouped by industry
      field.

      3. [x] Add average salary card (computed from graduates with non-null
      salary) and top-3 universities card (sorted by graduate count).

      4. [x] Implement a `refreshDashboard()` function that recomputes all
      metrics from localStorage `graduates` data and updates the DOM; call it on
      every data mutation (add, edit, delete, import).

      5. [x] Seed localStorage with 2 demo universities and 5 demo graduates
      (varied industries and salaries) on first load if keys are absent.


      ### Universities management

      1. [x] Create the Вузы tab with a card/table listing universities from
      localStorage `unis` (columns: name, city, description, website).

      2. [x] Add an "Добавить вуз" form (inline or modal) with fields: name,
      city, description, website URL; validate required fields and save to
      `unis` in localStorage.

      3. [x] Implement edit functionality: clicking "Редактировать" opens a
      pre-filled modal form; on save, update the entry in `unis` and re-render
      the list; log the action to `actionLogs`.

      4. [x] Implement delete with a confirmation dialog; remove from `unis`,
      re-render, update university dropdown in graduates form, log the action to
      `actionLogs`.


      ### Graduates management and CSV import

      1. [x] Create the Выпускники tab with three sections: manual add form, CSV
      import block, graduates table.

      2. [x] Build the manual add form with fields: ФИО, university dropdown
      (populated from `unis`), graduation year, specialty, workplace, position,
      industry select (IT/Образование/Производство/Медицина/Другое), salary
      (optional number), email; validate required fields on submit.

      3. [x] On valid submit, push new graduate object to `graduates` in
      localStorage, log to `actionLogs`, refresh dashboard, and re-render
      graduates table.

      4. [x] Build CSV import block: file input, "Импортировать" button (enabled
      after file selection), scrollable log area.

      5. [x] Implement CSV parser supporting quoted fields and in-field
      newlines; parse headers: ФИО, Вуз, Год выпуска, Специальность, Место
      работы, Должность, Сфера деятельности, Зарплата, Email.

      6. [x] After parsing, validate each row (ФИО required, year is a number);
      add valid rows to `graduates`, collect errors with row number and reason,
      display summary in log area.

      7. [x] Save import record {datetime, filename, successCount, errorCount,
      log} to `importLogs` in localStorage.

      8. [x] Render graduates table with columns: ФИО, Вуз, Год выпуска, Сфера
      деятельности, Место работы, Зарплата, Действия (edit/delete buttons).

      9. [x] Edit graduate via modal form (pre-filled); on save update
      `graduates`, log action, refresh dashboard, re-render table.

      10. [x] Delete graduate with confirmation; update `graduates`, log action,
      refresh dashboard, re-render table.


      ### Reports and logs

      1. [x] Create the "Аналитика и логи" tab with two sections: import history
      table and recent admin actions log.

      2. [x] Render import history from `importLogs` (date/time, filename,
      success count, error count) in a styled table, newest first.

      3. [x] Render recent admin actions from `actionLogs` (timestamp, action
      description) in a scrollable list, newest first.

      4. [x] Add "Скачать CSV" button that serializes all graduates from
      localStorage to CSV string (with headers: ФИО, Вуз, Год выпуска,
      Специальность, Место работы, Должность, Сфера деятельности, Зарплата,
