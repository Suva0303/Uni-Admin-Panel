    app/tabs/GraduatesTab.tsx: >
      import { useState, useRef } from 'react';

      import { Plus, Upload, Pencil, Trash2, Check, X } from 'lucide-react';

      import GlassCard from '../GlassCard';

      import type { Graduate, University, ImportLog, Industry } from '../types';

      import { INDUSTRIES } from '../types';

      import { Dialog, DialogContent, DialogHeader, DialogTitle } from
      '@/components/ui/dialog';

      import { ScrollArea } from '@/components/ui/scroll-area';


      interface GraduatesTabProps {
        graduates: Graduate[];
        universities: University[];
        onAdd: (g: Omit<Graduate, 'id'>) => void;
        onEdit: (g: Graduate) => void;
        onDelete: (id: string) => void;
        onImport: (rows: Omit<Graduate, 'id'>[], log: ImportLog) => void;
      }


      const emptyGrad: Omit<Graduate, 'id'> = {
        fullName: '', university: '', graduationYear: new Date().getFullYear(), specialty: '',
        workplace: '', position: '', industry: 'IT', salary: undefined, email: '',
      };


      function parseCSV(text: string): string[][] {
        const rows: string[][] = [];
        let col = '';
        let cols: string[] = [];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (ch === '"') {
            if (inQuotes && text[i + 1] === '"') { col += '"'; i++; }
            else inQuotes = !inQuotes;
          } else if (ch === ',' && !inQuotes) {
            cols.push(col); col = '';
          } else if ((ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) && !inQuotes) {
            if (ch === '\r') i++;
            cols.push(col); col = '';
            rows.push(cols); cols = [];
          } else {
            col += ch;
          }
        }
        if (col || cols.length) { cols.push(col); rows.push(cols); }
        return rows;
      }


      export default function GraduatesTab({ graduates, universities, onAdd,
      onEdit, onDelete, onImport }: GraduatesTabProps) {
        const [form, setForm] = useState<Omit<Graduate, 'id'>>(emptyGrad);
        const [formErrors, setFormErrors] = useState<Record<string, string>>({});
        const [editTarget, setEditTarget] = useState<Graduate | null>(null);
        const [editForm, setEditForm] = useState<Omit<Graduate, 'id'>>(emptyGrad);
        const [editErrors, setEditErrors] = useState<Record<string, string>>({});
        const [csvFile, setCsvFile] = useState<File | null>(null);
        const [importLogs, setImportLogs] = useState<string[]>([]);
        const [importDone, setImportDone] = useState(false);
        const fileRef = useRef<HTMLInputElement>(null);

        const inputStyle = { background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(200,190,255,0.5)', borderRadius: 10, padding: '8px 12px', fontSize: 14, outline: 'none', width: '100%', color: '#334155' };
        const selectStyle = { ...inputStyle, cursor: 'pointer' };

        const validateGrad = (g: Omit<Graduate, 'id'>) => {
          const e: Record<string, string> = {};
          if (!g.fullName.trim()) e.fullName = 'Обязательное поле';
          if (!g.university) e.university = 'Выберите вуз';
          if (!g.specialty.trim()) e.specialty = 'Обязательное поле';
          if (!g.graduationYear || isNaN(g.graduationYear)) e.graduationYear = 'Введите год';
          return e;
        };

        const handleAdd = () => {
          const e = validateGrad(form);
          if (Object.keys(e).length) { setFormErrors(e); return; }
          onAdd(form);
          setForm(emptyGrad);
          setFormErrors({});
        };

        const handleEditSave = () => {
          const e = validateGrad(editForm);
          if (Object.keys(e).length) { setEditErrors(e); return; }
          onEdit({ ...editTarget!, ...editForm });
          setEditTarget(null);
          setEditErrors({});
        };

        const handleImport = () => {
          if (!csvFile) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            const text = e.target?.result as string;
            const rows = parseCSV(text.trim());
            if (rows.length < 2) {
              setImportLogs(['Файл пустой или содержит только заголовки.']);
              setImportDone(true);
              return;
            }
            const [headerRow, ...dataRows] = rows;
            const headers = headerRow.map((h) => h.trim());
            const idx = (name: string) => headers.indexOf(name);

            const logs: string[] = [`Всего строк данных: ${dataRows.length}`];
            let success = 0;
            const errors: { row: number; reason: string }[] = [];
            const valid: Omit<Graduate, 'id'>[] = [];

            dataRows.forEach((row, i) => {
              const rowNum = i + 2;
              const get = (colName: string) => (row[idx(colName)] ?? '').trim();
              const fullName = get('ФИО');
              const year = parseInt(get('Год выпуска'), 10);
              if (!fullName) { errors.push({ row: rowNum, reason: 'Пустое поле ФИО' }); return; }
              if (isNaN(year)) { errors.push({ row: rowNum, reason: 'Неверный год выпуска' }); return; }

              const industryRaw = get('Сфера деятельности') as Industry;
              const industry: Industry = INDUSTRIES.includes(industryRaw) ? industryRaw : 'Другое';
              const salaryRaw = get('Зарплата');
              const salary = salaryRaw ? parseFloat(salaryRaw) || undefined : undefined;

              valid.push({
                fullName,
                university: get('Вуз'),
                graduationYear: year,
                specialty: get('Специальность'),
                workplace: get('Место работы'),
                position: get('Должность'),
                industry,
                salary,
                email: get('Email'),
              });
              success++;
            });

            errors.forEach(({ row, reason }) => logs.push(`⚠ Строка ${row}: ${reason}`));
            logs.push(`✓ Успешно импортировано: ${success}`);
            if (errors.length) logs.push(`✗ Ошибок: ${errors.length}`);

            const importLog: ImportLog = {
              id: crypto.randomUUID(),
              datetime: new Date().toLocaleString('ru-RU'),
              filename: csvFile.name,
              total: dataRows.length,
              success,
              errors: errors.length,
              log: logs,
            };

            onImport(valid, importLog);
            setImportLogs(logs);
            setImportDone(true);
          };
          reader.readAsText(csvFile, 'utf-8');
        };

        return (
          <div className="space-y-6">
            <h2 className="text-2xl font-bold text-slate-800">Выпускники</h2>

