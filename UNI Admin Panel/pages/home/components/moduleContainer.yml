    app/tabs/DashboardTab.tsx: >
      import { useMemo } from 'react';

      import { Users, Briefcase, TrendingUp, DollarSign, Award } from
      'lucide-react';

      import GlassCard from '../GlassCard';

      import type { Graduate, University } from '../types';

      import { INDUSTRIES } from '../types';


      interface DashboardTabProps {
        graduates: Graduate[];
        universities: University[];
      }


      const INDUSTRY_COLORS: Record<string, string> = {
        IT: '#b8a9f5',
        Образование: '#99e9c8',
        Производство: '#ffd6a5',
        Медицина: '#fca5a5',
        Другое: '#a5d8ff',
      };


      export default function DashboardTab({ graduates, universities }:
      DashboardTabProps) {
        const stats = useMemo(() => {
          const total = graduates.length;
          const employed = graduates.filter((g) => g.workplace && g.workplace.trim() !== '').length;
          const employedPct = total > 0 ? Math.round((employed / total) * 100) : 0;

          const withSalary = graduates.filter((g) => g.salary && g.salary > 0);
          const avgSalary = withSalary.length > 0 ? Math.round(withSalary.reduce((s, g) => s + (g.salary ?? 0), 0) / withSalary.length) : null;

          const industryCount = INDUSTRIES.reduce<Record<string, number>>((acc, ind) => {
            acc[ind] = graduates.filter((g) => g.industry === ind).length;
            return acc;
          }, {});

          const maxIndustry = Math.max(...Object.values(industryCount), 1);

          const uniCount = universities.map((u) => ({
            name: u.name,
            count: graduates.filter((g) => g.university === u.name).length,
          })).sort((a, b) => b.count - a.count).slice(0, 3);

          return { total, employed, employedPct, avgSalary, industryCount, maxIndustry, uniCount };
        }, [graduates, universities]);

        return (
          <div className="space-y-6">
            <h2 className="text-2xl font-bold text-slate-800">Дашборд трудоустройства</h2>

            {/* Metric cards */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <GlassCard>
                <div className="flex items-start justify-between">
                  <div>
                    <p className="text-xs text-slate-400 font-medium mb-1">Всего выпускников</p>
                    <p className="text-3xl font-bold text-slate-800">{stats.total}</p>
                  </div>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: 'rgba(184,169,245,0.2)' }}>
                    <Users size={20} style={{ color: '#b8a9f5' }} />
                  </div>
                </div>
              </GlassCard>

              <GlassCard>
                <div className="flex items-start justify-between">
                  <div>
                    <p className="text-xs text-slate-400 font-medium mb-1">Трудоустроено</p>
                    <p className="text-3xl font-bold text-slate-800">{stats.employed}</p>
                  </div>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: 'rgba(153,233,200,0.2)' }}>
                    <Briefcase size={20} style={{ color: '#2aab7d' }} />
                  </div>
                </div>
              </GlassCard>

              <GlassCard>
                <div className="flex items-start justify-between">
                  <div>
                    <p className="text-xs text-slate-400 font-medium mb-1">% трудоустройства</p>
                    <p className="text-3xl font-bold text-slate-800">{stats.employedPct}%</p>
                  </div>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: 'rgba(255,214,165,0.2)' }}>
                    <TrendingUp size={20} style={{ color: '#e8943a' }} />
                  </div>
                </div>
                <div className="mt-3 h-2 rounded-full overflow-hidden" style={{ background: 'rgba(200,190,255,0.2)' }}>
                  <div className="h-full rounded-full transition-all" style={{ width: `${stats.employedPct}%`, background: 'linear-gradient(90deg, #b8a9f5, #99e9c8)' }} />
                </div>
              </GlassCard>

              <GlassCard>
                <div className="flex items-start justify-between">
                  <div>
                    <p className="text-xs text-slate-400 font-medium mb-1">Средняя зарплата</p>
                    <p className="text-3xl font-bold text-slate-800">
                      {stats.avgSalary ? `${stats.avgSalary.toLocaleString('ru-RU')} ₽` : '—'}
                    </p>
                  </div>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: 'rgba(165,216,255,0.2)' }}>
                    <DollarSign size={20} style={{ color: '#3b82f6' }} />
                  </div>
                </div>
              </GlassCard>
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              {/* Industry distribution */}
              <GlassCard>
                <h3 className="text-base font-semibold text-slate-700 mb-5">Распределение по отраслям</h3>
                <div className="space-y-3">
                  {INDUSTRIES.map((ind) => {
                    const count = stats.industryCount[ind] ?? 0;
                    const pct = stats.total > 0 ? Math.round((count / stats.total) * 100) : 0;
                    const barWidth = stats.maxIndustry > 0 ? Math.round((count / stats.maxIndustry) * 100) : 0;
                    return (
                      <div key={ind}>
                        <div className="flex justify-between items-center mb-1">
                          <span className="text-sm text-slate-600 font-medium">{ind}</span>
                          <span className="text-sm font-semibold text-slate-700">{count} <span className="text-slate-400 font-normal text-xs">({pct}%)</span></span>
                        </div>
                        <div className="h-2.5 rounded-full overflow-hidden" style={{ background: 'rgba(200,190,255,0.15)' }}>
                          <div className="h-full rounded-full transition-all duration-500" style={{ width: `${barWidth}%`, background: INDUSTRY_COLORS[ind] }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </GlassCard>

              {/* Top universities */}
              <GlassCard>
                <h3 className="text-base font-semibold text-slate-700 mb-5 flex items-center gap-2">
                  <Award size={18} style={{ color: '#b8a9f5' }} /> Топ вузов по числу выпускников
                </h3>
                {stats.uniCount.length === 0 ? (
                  <p className="text-sm text-slate-400">Нет данных</p>
                ) : (
                  <div className="space-y-4">
                    {stats.uniCount.map((u, idx) => (
                      <div key={u.name} className="flex items-center gap-3">
                        <div className="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold text-white flex-shrink-0" style={{ background: idx === 0 ? '#b8a9f5' : idx === 1 ? '#99e9c8' : '#ffd6a5' }}>
                          {idx + 1}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-medium text-slate-700 truncate">{u.name}</p>
                        </div>
                        <span className="text-sm font-bold text-slate-700 flex-shrink-0">{u.count}</span>
                      </div>
                    ))}
                  </div>
                )}
              </GlassCard>
            </div>
          </div>
        );
      }
