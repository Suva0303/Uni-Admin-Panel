                    { key: 'fullName', label: 'ФИО *', type: 'text' },
                    { key: 'specialty', label: 'Специальность *', type: 'text' },
                    { key: 'graduationYear', label: 'Год выпуска *', type: 'number' },
                    { key: 'workplace', label: 'Место работы', type: 'text' },
                    { key: 'position', label: 'Должность', type: 'text' },
                    { key: 'salary', label: 'Зарплата (₽)', type: 'number' },
                    { key: 'email', label: 'Email', type: 'email' },
                  ].map(({ key, label, type }) => (
                    <div key={key}>
                      <label className="text-xs font-medium text-slate-500 mb-1 block">{label}</label>
                      <input
                        style={inputStyle}
                        type={type}
                        value={(editForm as Record<string, unknown>)[key] as string ?? ''}
                        onChange={(e) => setEditForm((p) => ({ ...p, [key]: type === 'number' ? (e.target.value === '' ? undefined : Number(e.target.value)) : e.target.value }))}
                      />
                      {editErrors[key] && <p className="text-xs text-rose-400 mt-1">{editErrors[key]}</p>}
                    </div>
                  ))}
                  <div>
                    <label className="text-xs font-medium text-slate-500 mb-1 block">Вуз *</label>
                    <select style={selectStyle} value={editForm.university} onChange={(e) => setEditForm((p) => ({ ...p, university: e.target.value }))}>
                      <option value="">— Выберите —</option>
                      {universities.map((u) => <option key={u.id} value={u.name}>{u.name}</option>)}
                    </select>
                    {editErrors.university && <p className="text-xs text-rose-400 mt-1">{editErrors.university}</p>}
                  </div>
                  <div>
                    <label className="text-xs font-medium text-slate-500 mb-1 block">Сфера деятельности</label>
                    <select style={selectStyle} value={editForm.industry} onChange={(e) => setEditForm((p) => ({ ...p, industry: e.target.value as Industry }))}>
                      {INDUSTRIES.map((i) => <option key={i} value={i}>{i}</option>)}
                    </select>
                  </div>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={handleEditSave} className="flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-semibold text-white" style={{ background: 'linear-gradient(135deg, #b8a9f5, #93c5fd)' }}>
                    <Check size={15} /> Сохранить
                  </button>
                  <button onClick={() => { setEditTarget(null); setEditErrors({}); }} className="px-5 py-2 rounded-xl text-sm text-slate-500 font-medium" style={{ background: 'rgba(200,190,255,0.15)', border: '1px solid rgba(200,190,255,0.3)' }}>
                    Отмена
                  </button>
                </div>
              </DialogContent>
            </Dialog>
          </div>
        );
      }
    app/tabs/ReportsTab.tsx: >
      import { Download } from 'lucide-react';

      import GlassCard from '../GlassCard';

      import type { Graduate, ImportLog, ActionLog } from '../types';

      import { ScrollArea } from '@/components/ui/scroll-area';


      interface ReportsTabProps {
        graduates: Graduate[];
        importLogs: ImportLog[];
        actionLogs: ActionLog[];
      }


      function exportCSV(graduates: Graduate[]) {
        const headers = ['ФИО', 'Вуз', 'Год выпуска', 'Специальность', 'Место работы', 'Должность', 'Сфера деятельности', 'Зарплата', 'Email'];
        const escape = (v: unknown) => {
          const s = String(v ?? '');
          return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
        };
        const rows = graduates.map((g) => [g.fullName, g.university, g.graduationYear, g.specialty, g.workplace, g.position, g.industry, g.salary ?? '', g.email].map(escape).join(','));
        const csv = [headers.join(','), ...rows].join('\r\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `graduates_${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }


      export default function ReportsTab({ graduates, importLogs, actionLogs }:
      ReportsTabProps) {
        return (
          <div className="space-y-6">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <h2 className="text-2xl font-bold text-slate-800">Аналитика и логи</h2>
              <button
                onClick={() => exportCSV(graduates)}
                className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white shadow-md hover:shadow-lg transition-all hover:scale-105"
                style={{ background: 'linear-gradient(135deg, #99e9c8, #93c5fd)' }}
              >
                <Download size={15} /> Скачать CSV
              </button>
            </div>

            {/* Import history */}
            <GlassCard>
              <h3 className="text-base font-semibold text-slate-700 mb-4">История импортов</h3>
              {importLogs.length === 0 ? (
                <p className="text-sm text-slate-400">Импорты ещё не выполнялись.</p>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr style={{ background: 'rgba(200,190,255,0.1)' }}>
                        {['Дата/время', 'Файл', 'Строк', 'Успешно', 'Ошибок', 'Лог'].map((h) => (
                          <th key={h} className="text-left text-xs font-semibold text-slate-500 px-4 py-3 whitespace-nowrap">{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {importLogs.map((log, idx) => (
                        <tr key={log.id} style={{ background: idx % 2 === 0 ? 'rgba(255,255,255,0.3)' : 'transparent' }}>
                          <td className="px-4 py-3 text-slate-600 whitespace-nowrap">{log.datetime}</td>
                          <td className="px-4 py-3 text-slate-700 font-medium max-w-40 truncate">{log.filename}</td>
                          <td className="px-4 py-3 text-slate-600">{log.total}</td>
                          <td className="px-4 py-3"><span className="px-2 py-0.5 rounded-lg text-xs font-semibold" style={{ background: 'rgba(153,233,200,0.3)', color: '#2aab7d' }}>{log.success}</span></td>
                          <td className="px-4 py-3"><span className="px-2 py-0.5 rounded-lg text-xs font-semibold" style={{ background: log.errors > 0 ? 'rgba(252,165,165,0.3)' : 'rgba(200,200,200,0.15)', color: log.errors > 0 ? '#e05252' : '#94a3b8' }}>{log.errors}</span></td>
                          <td className="px-4 py-3">
                            <details className="cursor-pointer">
                              <summary className="text-xs text-violet-500 font-medium">Показать</summary>
                              <div className="mt-1 p-2 rounded-lg text-xs font-mono text-slate-600 space-y-0.5" style={{ background: 'rgba(0,0,0,0.03)' }}>
                                {log.log.map((l, i) => <div key={i}>{l}</div>)}
                              </div>
                            </details>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </GlassCard>

            {/* Action logs */}
            <GlassCard>
              <h3 className="text-base font-semibold text-slate-700 mb-4">Журнал действий администратора</h3>
              {actionLogs.length === 0 ? (
                <p className="text-sm text-slate-400">Действий ещё не было.</p>
              ) : (
                <ScrollArea className="h-72">
                  <div className="space-y-2 pr-2">
                    {actionLogs.map((log) => (
                      <div key={log.id} className="flex items-start gap-3 p-3 rounded-xl" style={{ background: 'rgba(255,255,255,0.5)', border: '1px solid rgba(200,190,255,0.2)' }}>
                        <div className="w-2 h-2 rounded-full mt-1.5 flex-shrink-0" style={{ background: '#b8a9f5' }} />
                        <div className="flex-1 min-w-0">
                          <p className="text-sm text-slate-700">{log.description}</p>
                          <p className="text-xs text-slate-400 mt-0.5">{log.datetime}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </ScrollArea>
              )}
            </GlassCard>
          </div>
        );
      }
