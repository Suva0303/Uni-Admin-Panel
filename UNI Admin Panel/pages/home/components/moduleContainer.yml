    app/app.tsx: |
      'use client';

      import '@/index.css';
      import { useState, useCallback, useEffect } from 'react';
      import type { University, Graduate, AdminTab, ImportLog } from './types';
      import {
        getUniversities,
        saveUniversities,
        getGraduates,
        saveGraduates,
        getImportLogs,
        saveImportLogs,
        getActionLogs,
        addActionLog,
        seedDemoData,
      } from './storage';
      import LandingPage from './LandingPage';
      import AdminLayout from './AdminLayout';
      import DashboardTab from './tabs/DashboardTab';
      import UniversitiesTab from './tabs/UniversitiesTab';
      import GraduatesTab from './tabs/GraduatesTab';
      import ReportsTab from './tabs/ReportsTab';

      export default function App() {
        const [isAdmin, setIsAdmin] = useState(false);
        const [activeTab, setActiveTab] = useState<AdminTab>('dashboard');
        const [universities, setUniversities] = useState<University[]>([]);
        const [graduates, setGraduates] = useState<Graduate[]>([]);
        const [importLogs, setImportLogs] = useState<ImportLog[]>([]);
        const [actionLogs, setActionLogs] = useState<ReturnType<typeof getActionLogs>>([]);

        useEffect(() => {
          seedDemoData();
          setUniversities(getUniversities());
          setGraduates(getGraduates());
          setImportLogs(getImportLogs());
          setActionLogs(getActionLogs());
        }, []);

        const refreshAll = useCallback(() => {
          setUniversities(getUniversities());
          setGraduates(getGraduates());
          setImportLogs(getImportLogs());
          setActionLogs(getActionLogs());
        }, []);

        const handleAddUniversity = useCallback((u: Omit<University, 'id'>) => {
          const unis = getUniversities();
          unis.push({ ...u, id: crypto.randomUUID() });
          saveUniversities(unis);
          addActionLog('Добавлен вуз: ' + u.name);
          refreshAll();
        }, [refreshAll]);

        const handleEditUniversity = useCallback((u: University) => {
          const unis = getUniversities().map((x) => (x.id === u.id ? u : x));
          saveUniversities(unis);
          addActionLog('Изменён вуз: ' + u.name);
          refreshAll();
        }, [refreshAll]);

        const handleDeleteUniversity = useCallback((id: string) => {
          const unis = getUniversities();
          const found = unis.find((u) => u.id === id);
          saveUniversities(unis.filter((u) => u.id !== id));
          if (found) addActionLog('Удалён вуз: ' + found.name);
          refreshAll();
        }, [refreshAll]);

        const handleAddGraduate = useCallback((g: Omit<Graduate, 'id'>) => {
          const grads = getGraduates();
          grads.push({ ...g, id: crypto.randomUUID() });
          saveGraduates(grads);
          addActionLog('Добавлен выпускник: ' + g.fullName);
          refreshAll();
        }, [refreshAll]);

        const handleEditGraduate = useCallback((g: Graduate) => {
          const grads = getGraduates().map((x) => (x.id === g.id ? g : x));
          saveGraduates(grads);
          addActionLog('Изменён выпускник: ' + g.fullName);
          refreshAll();
        }, [refreshAll]);

        const handleDeleteGraduate = useCallback((id: string) => {
          const grads = getGraduates();
          const found = grads.find((g) => g.id === id);
          saveGraduates(grads.filter((g) => g.id !== id));
          if (found) addActionLog('Удалён выпускник: ' + found.fullName);
          refreshAll();
        }, [refreshAll]);

        const handleImport = useCallback((rows: Omit<Graduate, 'id'>[], log: ImportLog) => {
          const grads = getGraduates();
          rows.forEach((r) => grads.push({ ...r, id: crypto.randomUUID() }));
          saveGraduates(grads);
          const logs = getImportLogs();
          logs.unshift(log);
          saveImportLogs(logs);
          addActionLog('Импорт CSV ' + log.filename + ': ' + log.success + ' записей, ' + log.errors + ' ошибок');
          refreshAll();
        }, [refreshAll]);

        const enterAdmin = useCallback(() => {
          refreshAll();
          setActiveTab('dashboard');
          setIsAdmin(true);
        }, [refreshAll]);

        const exitAdmin = useCallback(() => {
          setIsAdmin(false);
        }, []);

        if (!isAdmin) {
          return <LandingPage onEnterAdmin={enterAdmin} />;
        }

        return (
          <AdminLayout activeTab={activeTab} onTabChange={setActiveTab} onExit={exitAdmin}>
            {activeTab === 'dashboard' && (
              <DashboardTab graduates={graduates} universities={universities} />
            )}
            {activeTab === 'universities' && (
              <UniversitiesTab
                universities={universities}
                onAdd={handleAddUniversity}
                onEdit={handleEditUniversity}
                onDelete={handleDeleteUniversity}
              />
            )}
            {activeTab === 'graduates' && (
              <GraduatesTab
                graduates={graduates}
                universities={universities}
                onAdd={handleAddGraduate}
                onEdit={handleEditGraduate}
                onDelete={handleDeleteGraduate}
                onImport={handleImport}
              />
            )}
            {activeTab === 'reports' && (
              <ReportsTab
                graduates={graduates}
                importLogs={importLogs}
                actionLogs={actionLogs}
              />
            )}
          </AdminLayout>
        );
      }
    components/ui/button.tsx: |+
      import * as React from "react"
      import { Slot } from "@radix-ui/react-slot"
      import { cva, type VariantProps } from "class-variance-authority"

      import { cn } from "@/lib/utils"

      const buttonVariants = cva(
        "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0",
        {
          variants: {
            variant: {
              default:
                "bg-primary text-primary-foreground shadow hover:bg-primary/90",
              destructive:
                "bg-destructive text-destructive-foreground shadow-sm hover:bg-destructive/90",
              outline:
                "border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground",
              secondary:
                "bg-secondary text-secondary-foreground shadow-sm hover:bg-secondary/80",
              ghost: "hover:bg-accent hover:text-accent-foreground",
              link: "text-primary underline-offset-4 hover:underline",
            },
            size: {
              default: "h-9 px-4 py-2",
              sm: "h-8 rounded-md px-3 text-xs",
              lg: "h-10 rounded-md px-8",
              icon: "h-9 w-9",
            },
          },
          defaultVariants: {
            variant: "default",
            size: "default",
          },
        }
      )

      export interface ButtonProps
        extends React.ButtonHTMLAttributes<HTMLButtonElement>,
          VariantProps<typeof buttonVariants> {
        asChild?: boolean
      }

      const Button = React.forwardRef<HTMLButtonElement, ButtonProps>(
        ({ className, variant, size, asChild = false, ...props }, ref) => {
          const Comp = asChild ? Slot : "button"
          return (
            <Comp
              className={cn(buttonVariants({ variant, size, className }))}
              ref={ref}
              {...props}
            />
          )
        }
      )
      Button.displayName = "Button"

      export { Button, buttonVariants }

